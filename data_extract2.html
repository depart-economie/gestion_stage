<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج تنقيط الأستاذ - Auto-complete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #0f766e, #1e3a8a);
            color: rgba(31, 29, 29, 0.822);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.95;
            font-size: 16px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }

        .card-title {
            font-size: 22px;
            font-weight: bold;
            color: #0f766e;
            border-right: 4px solid #0f766e;
            padding-right: 15px;
            margin-bottom: 20px;
        }

        .autocomplete-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
            
        }

        #teacherName {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
            background: white;
            text-align: center; 
        }

        #teacherName:focus {
            border-color: #0f766e;
            box-shadow: 0 0 0 3px rgba(15,118,110,0.1);
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-height: 350px;
            overflow-y: auto;
            z-index: 1000;
            margin-top: 5px;
            border: 1px solid #e2e8f0;
            display: none;
        }

        .autocomplete-list div {
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f1f5f9;
            font-size: 15px;
            text-align: center;
        }

        .autocomplete-list div:last-child {
            border-bottom: none;
        }

        .autocomplete-list div:hover {
            background-color: #f0fdf4;
        }

        .autocomplete-active {
            background-color: #ccfbf1 !important;
            color: #0f766e;
            font-weight: 500;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
            justify-content: center;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #0f766e;
            color: white;
        }

        .btn-primary:hover {
            background: #0d5c56;
            transform: translateY(-2px);
        }

        .btn-pdf {
            background: #2563eb;
            color: white;
        }

        .btn-pdf:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-soft {
            background: #8b5cf6;
            color: white;
        }

        .btn-soft:hover {
            background: #7c3aed;
            transform: translateY(-2px);
        }

        .btn-clear {
            background: #e2e8f0;
            color: #334155;
        }

        .btn-clear:hover {
            background: #cbd5e1;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #0f172a;
            margin-top: 8px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #0f766e;
        }

        td.text-right {
            text-align: right;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .hidden-print {
            position: absolute;
            left: -9999px;
            top: 0;
        }
        
        .suggestions-title {
            font-size: 12px;
            padding: 8px 15px;
            background: #f1f5f9;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .results-count {
            font-size: 13px;
            color: #0f766e;
            margin-right: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1> تفاصيل تنقيط الاستاذ </h1>
        <div class="card">
              <div class="card-title"> البحث عن الأستاذ</div>
              
              <div class="autocomplete-container">
                  <input type="text" id="teacherName" placeholder="اكتب اسم الأستاذ" autocomplete="off">
                  <div id="autocompleteList" class="autocomplete-list"></div>
              </div>

              <div class="toolbar">
                  <button class="btn-primary" onclick="fetchTeacherData()">جلب البيانات</button>
                  <button class="btn-primary" onclick="clearAll()"> إفراغ البيانات</button>
              </div>

              <div id="status" class="status"></div>
          </div>
      </div>
            
    
    <div class="card">
        <div class="card-title"> ملخص النتائج</div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label"> اسم الأستاذ</div>
                <div class="stat-value" id="previewName">—</div>
            </div>
            <div class="stat-item">
                <div class="stat-label"> المعايير غير الصفرية</div>
                <div class="stat-value" id="previewCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label"> المجموع النهائي</div>
                <div class="stat-value" id="previewTotal">0.00</div>
            </div>
        </div>

        <div style="font-weight: bold; margin: 20px 0 10px; font-size: 18px;"> المعايير ذات القيم غير الصفرية</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>#</th><th>المعيار</th><th>القيمة</th></tr>
                </thead>
                <tbody id="resultsTable">
                    <tr><td colspan="3" style="text-align: center;"> لم يتم جلب بيانات بعد</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="pdfContainer" class="hidden-print"></div>

<script>
    // رابط Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxSM9d6okGKuKEdPzU_I5adPBl1f5YkATR9Xn5T_qORIim1Fgpo_AFMicxEp3N0o0fY/exec";
    
    // =====================================================
    //  قائمة الأساتذة (تم إضافة جميع الأسماء المطلوبة)
    // =====================================================
    const TEACHERS_LIST = [
        "عليوان عبد الغاني",
        "بن عطاء الله عادل",
        "قطوش مريم",
        "محلي كمال",
        "لطرش ذهبية",
        "مومني اسماعيل",
        "آيت بارة شفيعة",
        "مهني دنيا زاد",
        "علمي حمزة",
        "مرابط ساعد",
        "هواري عبد القادر",
        "بكوش لامية",
        "عويسي أمين",
        "صادق هادي",
        "بن عواق شرف الدين أمين",
        "يوسفي امان",
        "منصوري سعدان",
        "بلقاضي آسيا",
        "العيفة عبد الحق",
        "بن دعاس زهير",
        "سكاك مراد",
        "بورغدة حسين",
        "نوارة عزيزة",
        "بن عامر نبيل",
        "غبولي أحمد",
        "حنان درحمون",
        "سفيان دلفوف",
        "غدار رفيق",
        "دنفير مصطفى",
        "بونشادة نوال",
        "نادية بن ميسية",
        "شودار حمزة",
        "زينب بوقاعة",
        "حصروري نادية",
        "زيات عادل"
    ];
    
    // قائمة المعايير الافتراضية
    const DEFAULT_CRITERIA = [
        "الرتبة العلمية", "الإستفادات السابقة للثلاث السنوات الأخيرة", "جوائز دولية",
        "مقال علمي صنف A+", "مقال علمي صنف أ", "مقال علمي صنف ب", "مقال علمي صنف ج",
        "مداخلة دولية مصنفة (SCOPUS/WOS)", "مداخلة دولية مفهرسة", "مداخلة دولية غير مصنفة",
        "مداخلة وطنية", "مشروع دولي قيد الانجاز", "مشروع مع شريك اجتماعي-اقتصادي",
        "الإشراف على أطروحة دكتوراه نوقشت", "مساعدة الإشراف على أطروحة دكتوراه نوقشت",
        "المشاركة في لجان مناقشة الدكتوراه", "الإشراف على طالب STARTUP",
        "تأطير مشروع حاصل على لابل/مبتكر/مؤسسة ناشئة", "تأطير طلبة الماستر",
        "تأطير طلبة الليسانس", "تدريس محاضرة في جذع مشترك", "الخبرة التحكيمية في المجلات المصنفة",
        "العمل في الهيئات المرافقة", "Citation Scopus", "مطبوعة بيداغوجية فردية",
        "دروس بيداغوجية متوفرة على الخط", "Chapterbook محكم", "كتاب محكم بيداغوجي",
        "عضوية المجالس واللجان", "مدير مخبر/رئيس هيئة علمية", "عضوية المخبر/مدير النشر الجامعي",
        "المنصب العالي"
    ];

    // متغيرات عامة
    let currentTeacherData = null;

    function showStatus(message, type = 'info') {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;
        setTimeout(() => {
            if (document.getElementById('status').textContent === message) {
                statusDiv.className = 'status';
                statusDiv.textContent = '';
            }
        }, 4000);
    }

    // جلب بيانات أستاذ معين
    function fetchTeacherDataByName(teacherName) {
        return new Promise((resolve, reject) => {
            const callbackName = "callback_data_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
            const script = document.createElement('script');
            
            const timeout = setTimeout(() => {
                cleanup();
                reject(new Error("انتهت مهلة جلب البيانات"));
            }, 15000);
            
            function cleanup() {
                clearTimeout(timeout);
                if (script.parentNode) script.parentNode.removeChild(script);
                try { delete window[callbackName]; } catch(e) {}
            }
            
            window[callbackName] = function(response) {
                cleanup();
                resolve(response);
            };
            
            script.onerror = () => {
                cleanup();
                reject(new Error("فشل الاتصال بخادم البيانات"));
            };
            
            script.src = `${SCRIPT_URL}?teacherName=${encodeURIComponent(teacherName)}&callback=${encodeURIComponent(callbackName)}&t=${Date.now()}`;
            document.body.appendChild(script);
        });
    }

    // عرض البيانات
    function displayTeacherData(data) {
        const criteria = (data.criteria && data.criteria.length) ? data.criteria : DEFAULT_CRITERIA;
        const values = Array.isArray(data.values) ? data.values.map(v => parseFloat(v) || 0) : [];
        const total = (typeof data.total === 'number' && !isNaN(data.total)) ? data.total : values.reduce((a, b) => a + b, 0);
        const teacherName = data.teacherName || document.getElementById('teacherName').value.trim();
        
        // بناء الصفوف غير الصفرية
        const nonZeroRows = [];
        const maxLen = Math.max(criteria.length, values.length);
        for (let i = 0; i < maxLen; i++) {
            const label = criteria[i] || `معيار ${i + 1}`;
            const val = values[i] || 0;
            if (val !== 0) {
                nonZeroRows.push({ index: i + 1, label, value: val.toFixed(2) });
            }
        }
        
        // تحديث الواجهة
        document.getElementById('previewName').textContent = teacherName || '—';
        document.getElementById('previewCount').textContent = nonZeroRows.length;
        document.getElementById('previewTotal').textContent = total.toFixed(2);
        
        // تحديث الجدول
        const tbody = document.getElementById('resultsTable');
        tbody.innerHTML = '';
        
        if (nonZeroRows.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">لا توجد معايير بقيم غير صفرية</td></tr>';
        } else {
            nonZeroRows.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td style="text-align: right;">${row.label}</td>
                    <td>${row.value}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        currentTeacherData = { teacherName, criteria, values, total, rows: nonZeroRows };
    }
    
    // جلب بيانات الأستاذ
    async function fetchTeacherData() {
        const teacherName = document.getElementById('teacherName').value.trim();
        if (!teacherName) {
            showStatus(" الرجاء كتابة اسم الأستاذ أو اختياره من القائمة", "error");
            return;
        }
        
        try {
            showStatus(` جلب بيانات الأستاذ "${teacherName}"...`, "info");
            const response = await fetchTeacherDataByName(teacherName);
            
            if (!response || response.found === false) {
                throw new Error(response?.error || response?.message || "لم يتم العثور على الأستاذ في قاعدة البيانات");
            }
            
            displayTeacherData(response);
            showStatus(` تم جلب بيانات الأستاذ ${response.teacherName || teacherName} بنجاح`, "success");
        } catch (error) {
            showStatus(` فشل الجلب: ${error.message}`, "error");
            console.error(error);
        }
    }
    
    // Auto-complete باستخدام قائمة الأساتذة المضمنة
    const input = document.getElementById('teacherName');
    const autocompleteDiv = document.getElementById('autocompleteList');
    let currentFocus = -1;

    function showAutocomplete(filter) {
        if (!filter || filter.trim().length === 0) {
            autocompleteDiv.style.display = 'none';
            autocompleteDiv.innerHTML = '';
            return;
        }
        
        const filterLower = filter.trim().toLowerCase();
        const matches = TEACHERS_LIST.filter(name => 
            name.toLowerCase().includes(filterLower)
        ).slice(0, 15);
        
        if (matches.length === 0) {
            autocompleteDiv.style.display = 'none';
            autocompleteDiv.innerHTML = '';
            return;
        }
        
        autocompleteDiv.innerHTML = '';
        
        // إضافة عنوان للقائمة مع عدد النتائج
        const title = document.createElement('div');
        title.textContent = ` ${matches.length} من ${TEACHERS_LIST.length} أستاذ`;
        title.style.cssText = 'font-size: 12px; padding: 8px 15px; background: #f1f5f9; color: #0f766e; border-bottom: 1px solid #e2e8f0; font-weight: 500; text-align: center;';
        autocompleteDiv.appendChild(title);
        
        matches.forEach((name) => {
            const div = document.createElement('div');
            div.textContent = name;
            div.addEventListener('click', () => {
                input.value = name;
                autocompleteDiv.style.display = 'none';
                fetchTeacherData();
            });
            autocompleteDiv.appendChild(div);
        });
        
        autocompleteDiv.style.display = 'block';
        currentFocus = -1;
    }

    function removeAutocomplete() {
        autocompleteDiv.style.display = 'none';
        autocompleteDiv.innerHTML = '';
        currentFocus = -1;
    }

    input.addEventListener('input', function(e) {
        showAutocomplete(this.value);
    });

    input.addEventListener('keydown', function(e) {
        const items = Array.from(autocompleteDiv.querySelectorAll('div')).filter(div => !div.textContent.includes('📋') && !div.textContent.includes('أستاذ'));
        if (items.length === 0) return;
        
        if (e.key === 'ArrowDown') {
            currentFocus++;
            if (currentFocus >= items.length) currentFocus = 0;
            updateActive(items);
            e.preventDefault();
        } 
        else if (e.key === 'ArrowUp') {
            currentFocus--;
            if (currentFocus < 0) currentFocus = items.length - 1;
            updateActive(items);
            e.preventDefault();
        }
        else if (e.key === 'Enter') {
            if (currentFocus >= 0 && items[currentFocus]) {
                input.value = items[currentFocus].textContent;
                removeAutocomplete();
                fetchTeacherData();
                e.preventDefault();
            }
        }
        else if (e.key === 'Escape') {
            removeAutocomplete();
        }
    });

    function updateActive(items) {
        for (let i = 0; i < items.length; i++) {
            items[i].classList.remove('autocomplete-active');
        }
        if (items[currentFocus]) {
            items[currentFocus].classList.add('autocomplete-active');
        }
    }

    document.addEventListener('click', function(e) {
        if (e.target !== input && e.target.parentNode !== autocompleteDiv) {
            removeAutocomplete();
        }
    });
    
    function clearAll() {
        document.getElementById('teacherName').value = '';
        document.getElementById('previewName').textContent = '—';
        document.getElementById('previewCount').textContent = '0';
        document.getElementById('previewTotal').textContent = '0.00';
        document.getElementById('resultsTable').innerHTML = '<tr><td colspan="3" style="text-align: center;">⚠️ لم يتم جلب بيانات بعد</td></tr>';
        document.getElementById('pdfContainer').innerHTML = '';
        currentTeacherData = null;
        removeAutocomplete();
        showStatus(" تم إفراغ جميع البيانات", "info");
    }
    
    // رسالة ترحيبية مع عدد الأساتذة
    showStatus(` تم تحميل ${TEACHERS_LIST.length} أستاذ. ابدأ بكتابة الاسم للاقتراحات`, "success");
</script>
</body>
</html>
